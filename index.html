<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard - Master Stable</title>
    <style id="theme-style">
        :root {
            --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --border: #333;
            --accent: #bb86fc;
        }
        .light-theme {
            --bg: #f5f5f5; --panel: #ffffff; --text: #202020; --border: #ccc;
            --accent: #6200ee;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box; transition: background 0.3s;
            overflow: hidden;
        }
        #status-indicator {
            font-weight: bold; padding: 10px; margin-bottom: 15px;
            border-radius: 4px; text-align: center;
            background-color: var(--panel); border: 1px solid var(--border);
        }
        .container {
            display: flex; gap: 15px; flex-grow: 1; overflow: hidden;
            flex-direction: row; 
        }
        .horizontal-layout { flex-direction: column; }
        
        .column {
            background-color: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; display: flex; flex-direction: column;
            padding: 15px; flex: 1; min-width: 0; overflow: hidden;
        }

        /* FLEX RATIOS: Chat(1.2) | Activity(0.8) | Queue(1.2) */
        .container:not(.horizontal-layout) #pane-1 { flex: 1.2; }
        .container:not(.horizontal-layout) #pane-2 { flex: 0.8; }
        .container:not(.horizontal-layout) #pane-3 { flex: 1.2; }

        h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; text-transform: uppercase; }

        .content-area { 
            flex-grow: 1; overflow-y: auto; font-size: 1rem; 
            word-break: break-word; overflow-x: hidden;     
        }
        .chat-msg { margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; width: 100%; }
        .timestamp { font-size: 0.75rem; color: #888; display: block; margin-bottom: 2px; }
        .hide-chat-time #area-1 .timestamp { display: none !important; }

        .user-name { font-weight: bold; }
        .twitch-emote { vertical-align: middle; height: 28px; margin: 0 2px; }
        .badge-icon { height: 18px; vertical-align: middle; margin-right: 4px; border-radius: 2px; }
        .event-text { color: #03dac6; font-size: 0.95rem; font-weight: bold; }
        .event-subtext { color: #888; font-size: 0.85rem; font-style: italic; display: block; margin-top: 2px; }
    </style>
</head>
<body id="body-tag">

    <div id="status-indicator">Connecting...</div>

    <div class="container" id="main-container">
        <div class="column" id="pane-1"><h2>Live Chat</h2><div id="area-1" class="content-area"></div></div>
        <div class="column" id="pane-2"><h2>Activity</h2><div id="area-2" class="content-area"></div></div>
        <div class="column" id="pane-3"><h2>Filtered Queue</h2><div id="area-3" class="content-area"></div></div>
    </div>

    <script src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"></script>
    
    <script>
        const body = document.getElementById('body-tag');
        const container = document.getElementById('main-container');
        const area1 = document.getElementById('area-1');
        const area2 = document.getElementById('area-2');
        const area3 = document.getElementById('area-3');

        // Initial Settings Load
        let settings = {
            theme: localStorage.getItem('theme') || 'dark',
            layout: localStorage.getItem('layout') || 'vertical',
            queueCmd: localStorage.getItem('queueCmd') || '!c',
            showTime: localStorage.getItem('showTime') !== 'false'
        };

        // Apply saved states on boot
        if (settings.theme === 'light') body.classList.add('light-theme');
        if (settings.layout === 'horizontal') container.classList.add('horizontal-layout');
        if (!settings.showTime) body.classList.add('hide-chat-time');

        const client = new StreamerbotClient({
            onConnect: () => {
                document.getElementById('status-indicator').innerText = 'Connected';
                document.getElementById('status-indicator').style.color = '#00ff00';
            }
        });

        function formatEmotes(message, emotes) {
            if (!emotes || emotes.length === 0) return message;
            const sorted = [...emotes].sort((a, b) => b.startIndex - a.startIndex);
            let html = message;
            sorted.forEach(e => {
                const img = `<img class="twitch-emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${e.id}/default/dark/1.0">`;
                html = html.slice(0, e.startIndex) + img + html.slice(e.endIndex + 1);
            });
            return html;
        }

        function formatBadges(badges) {
            return (badges || []).map(b => `<img class="badge-icon" src="${b.imageUrl || b.url}">`).join('');
        }

        client.on('Twitch.ChatMessage', (data) => {
            const msgObj = data.data.message;
            if (!msgObj) return;

            const rawText = msgObj.message.toString();
            const lowerText = rawText.toLowerCase().trim();
            const args = lowerText.split(' ');
            
            const isBroadcaster = msgObj.isBroadcaster || msgObj.role === 4 || msgObj.username?.toLowerCase() === 'orrinn';
            const isMod = msgObj.isModerator || msgObj.role >= 3 || isBroadcaster;
            
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // --- COMMAND HANDLING ---
            if (isMod) {
                if (lowerText.startsWith("!qclear")) {
                    area3.innerHTML = "";
                    return;
                } else if (lowerText.startsWith("!time")) {
                    const isHidden = body.classList.toggle('hide-chat-time');
                    settings.showTime = !isHidden;
                    localStorage.setItem('showTime', settings.showTime);
                    return; 
                } else if (lowerText.startsWith("!settheme")) {
                    if (lowerText.includes("light")) {
                        body.classList.add('light-theme');
                        localStorage.setItem('theme', 'light');
                    } else if (lowerText.includes("dark")) {
                        body.classList.remove('light-theme');
                        localStorage.setItem('theme', 'dark');
                    }
                    return;
                } else if (lowerText.startsWith("!setcommand")) {
                    const newTrigger = args[1];
                    if (newTrigger && newTrigger.startsWith('!')) {
                        settings.queueCmd = newTrigger;
                        localStorage.setItem('queueCmd', newTrigger);
                    }
                    return;
                } else if (lowerText.startsWith("!layout")) {
                    container.classList.toggle('horizontal-layout');
                    localStorage.setItem('layout', container.classList.contains('horizontal-layout') ? 'horizontal' : 'vertical');
                    return;
                } else if (lowerText.startsWith("!reorder")) {
                    const p1 = document.getElementById('pane-1');
                    const p2 = document.getElementById('pane-2');
                    const p3 = document.getElementById('pane-3');
                    
                    // Specific mapping: !reorder 3 1 2 -> p3=1st, p1=2nd, p2=3rd
                    if (args.length >= 4) {
                        const orderMap = { "1": p1, "2": p2, "3": p3 };
                        if (orderMap[args[1]]) orderMap[args[1]].style.order = "1";
                        if (orderMap[args[2]]) orderMap[args[2]].style.order = "2";
                        if (orderMap[args[3]]) orderMap[args[3]].style.order = "3";
                    }
                    return;
                }
            }

            // --- UI RENDERING ---
            const emoteHtml = formatEmotes(rawText, msgObj.emotes || []);
            const badgeHtml = formatBadges(msgObj.badges);
            const userColor = msgObj.color || '#bb86fc';
            const baseContent = `<span class="timestamp">${timeStr}</span>${badgeHtml}<span class="user-name" style="color:${userColor}">${msgObj.displayName}:</span> `;

            // Standard Chat
            const chatDiv = document.createElement('div');
            chatDiv.className = 'chat-msg';
            chatDiv.innerHTML = baseContent + emoteHtml;
            area1.appendChild(chatDiv);
            area1.scrollTop = area1.scrollHeight;

            // Filtered Queue Check
            const trigger = settings.queueCmd.toLowerCase();
            if (lowerText.startsWith(trigger)) {
                const qDiv = document.createElement('div');
                qDiv.className = 'chat-msg';
                qDiv.style.borderLeft = "4px solid var(--accent)";
                qDiv.style.paddingLeft = "10px";
                
                // Strip the trigger word from display
                const displayMsg = emoteHtml.replace(new RegExp('^' + trigger, 'i'), '').trim();
                
                qDiv.innerHTML = baseContent + (displayMsg || "<em>[Empty Message]</em>");
                area3.appendChild(qDiv);
                area3.scrollTop = area3.scrollHeight;
            }
        });

        const logEvent = (main, sub = "") => {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="event-text">${main}</span>${sub ? `<span class="event-subtext">${sub}</span>` : ""}`;
            area2.prepend(div); 
        };

        client.on('Twitch.Follow', (d) => logEvent(`💖 ${d.data.user_name} followed!`));
        client.on('Twitch.Subscription', (d) => logEvent(`💜 ${d.data.user_name} subbed!`));
        client.on('Twitch.GiftSubscription', (d) => logEvent(`🎁 ${d.data.user_name} gifted a sub!`));
        client.on('Twitch.GiftBomb', (d) => logEvent(`💣 ${d.data.user_name} gifted ${d.data.gifts} subs!`));
        client.on('Twitch.Raid', (d) => logEvent(`⚔️ ${d.data.from_broadcaster_user_name} raided!`, `${d.data.viewers} viewers`));
        client.on('Twitch.RewardRedemption', (d) => logEvent(`🟡 ${d.data.reward.title}`, `By ${d.data.user_name} ${d.data.user_input ? `: "${d.data.user_input}"` : ""}`));
        client.on('Twitch.Cheer', (d) => logEvent(`✨ ${d.data.user_name} cheered ${d.data.bits} bits!`, d.data.message));
        client.on('Twitch.HypeTrainBegin', (d) => logEvent(`🚂 Hype Train Started!`, `Level ${d.data.level}`));
        client.on('Twitch.ShoutoutCreated', (d) => logEvent(`📢 Shoutout!`, `To ${d.data.to_broadcaster_user_name}`));
        client.on('Twitch.Announcement', (d) => { if (d.data.message.toLowerCase().includes('streak')) logEvent(`🔥 Stream Streak!`, d.data.message); });
    </script>
</body>
</html>
