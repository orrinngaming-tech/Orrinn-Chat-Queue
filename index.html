<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <style id="theme-style">
        :root {
            --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --border: #333;
            --accent: #bb86fc;
        }
        .light-theme {
            --bg: #f5f5f5; --panel: #ffffff; --text: #202020; --border: #ccc;
            --accent: #6200ee;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box; transition: background 0.3s;
            overflow: hidden;
        }
        #status-indicator {
            font-weight: bold; padding: 10px; margin-bottom: 15px;
            border-radius: 4px; text-align: center;
            background-color: var(--panel); border: 1px solid var(--border);
        }
        .container {
            display: flex; gap: 15px; flex-grow: 1; overflow: hidden;
            flex-direction: row; 
        }
        .horizontal-layout { flex-direction: column; }
        
        .column {
            background-color: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; display: flex; flex-direction: column;
            padding: 15px; flex: 1; min-width: 0; overflow: hidden;
        }
        .container:not(.horizontal-layout) #pane-1 { flex: 1.2; }
        .container:not(.horizontal-layout) #pane-2 { flex: 0.8; }
        .container:not(.horizontal-layout) #pane-3 { flex: 1.2; }

        h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; text-transform: uppercase; }

        .content-area { 
            flex-grow: 1; overflow-y: auto; font-size: 1rem; 
            word-break: break-word; overflow-x: hidden;     
        }
        .chat-msg { margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; width: 100%; }
        .timestamp { font-size: 0.75rem; color: #888; display: block; margin-bottom: 2px; }
        .user-name { font-weight: bold; }
        .twitch-emote { vertical-align: middle; height: 28px; margin: 0 2px; }
        .badge-icon { height: 18px; vertical-align: middle; margin-right: 4px; border-radius: 2px; }
        .event-text { color: #03dac6; font-size: 0.95rem; }
        .event-subtext { color: #888; font-size: 0.85rem; font-style: italic; display: block; margin-top: 2px; }
        
        /* Hidden state for live chat timestamps */
        .hide-timestamps .timestamp { display: none; }
    </style>
</head>
<body id="body-tag">

    <div id="status-indicator">Connecting to Streamer.bot...</div>

    <div class="container" id="main-container">
        <div class="column" id="pane-1"><h2>Live Chat</h2><div id="area-1" class="content-area"></div></div>
        <div class="column" id="pane-2"><h2>Activity Feed</h2><div id="area-2" class="content-area"></div></div>
        <div class="column" id="pane-3"><h2>Filtered Queue</h2><div id="area-3" class="content-area"></div></div>
    </div>

    <script src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"></script>
    
    <script>
        const container = document.getElementById('main-container');
        const chatArea = document.getElementById('area-1');
        const qArea = document.getElementById('area-3');

        const settings = {
            theme: localStorage.getItem('theme') || 'dark',
            layout: localStorage.getItem('layout') || 'vertical',
            queueCmd: localStorage.getItem('queueCmd') || '!c',
            showTime: localStorage.getItem('showTime') === 'true' // Load saved preference
        };

        function applySettings() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('view') === 'queue') {
                document.getElementById('pane-1').style.display = 'none';
                document.getElementById('pane-2').style.display = 'none';
                document.getElementById('status-indicator').style.display = 'none';
                document.body.style.padding = '5px';
            } else {
                if (settings.theme === 'light') document.body.classList.add('light-theme');
                if (settings.layout === 'horizontal') container.classList.add('horizontal-layout');
                if (!settings.showTime) chatArea.classList.add('hide-timestamps');
            }
        }
        applySettings();

        const client = new StreamerbotClient({
            onConnect: () => {
                const indicator = document.getElementById('status-indicator');
                indicator.innerText = 'Connected';
                indicator.style.color = '#00ff00';
            }
        });

        function formatEmotes(message, emotes) {
            if (!emotes || emotes.length === 0) return message;
            const sorted = [...emotes].sort((a, b) => b.startIndex - a.startIndex);
            let html = message;
            sorted.forEach(e => {
                const img = `<img class="twitch-emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${e.id}/default/dark/1.0">`;
                html = html.slice(0, e.startIndex) + img + html.slice(e.endIndex + 1);
            });
            return html;
        }

        function formatBadges(badges) {
            return (badges || []).map(b => `<img class="badge-icon" src="${b.imageUrl || b.url}" alt="${b.name}">`).join('');
        }

        function getTimestamp() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        client.on('Twitch.ChatMessage', (data) => {
            const msgObj = data.data.message;
            if (!msgObj) return;

            const cleanMessage = (msgObj.message || "").toString().trim();
            const lowerMessage = cleanMessage.toLowerCase();
            const isMod = msgObj.isModerator || msgObj.isBroadcaster;
            const time = getTimestamp();

            // --- COMMAND HANDLING ---
            if (isMod) {
                if (lowerMessage.includes('!qclear')) {
                    if (qArea) qArea.innerHTML = '';
                }
                if (lowerMessage.includes('!layout')) {
                    container.classList.toggle('horizontal-layout');
                    localStorage.setItem('layout', container.classList.contains('horizontal-layout') ? 'horizontal' : 'vertical');
                    return;
                }
                if (lowerMessage.includes('!time')) {
                    const active = chatArea.classList.toggle('hide-timestamps');
                    localStorage.setItem('showTime', !active);
                    return;
                }
            }

            // --- RENDERING ---
            const emoteHtml = formatEmotes(cleanMessage, msgObj.emotes || []);
            const badgeHtml = formatBadges(msgObj.badges);

            // Live Chat Entry
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="timestamp">${time}</span>${badgeHtml}<span class="user-name" style="color:${msgObj.color}">${msgObj.displayName}:</span> ${emoteHtml}`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            // --- QUEUE LOGIC ---
            const trigger = settings.queueCmd.toLowerCase();
            if (lowerMessage.startsWith(trigger + ' ') && !lowerMessage.includes('!qclear')) {
                const queueContent = emoteHtml.substring(trigger.length).trim();
                const qDiv = document.createElement('div');
                qDiv.className = 'chat-msg';
                qDiv.style.borderLeft = "4px solid var(--accent)";
                qDiv.style.paddingLeft = "10px";
                // Timestamps are ALWAYS shown in Queue for tracking purposes
                qDiv.innerHTML = `<span class="timestamp">${time}</span>${badgeHtml}<span class="user-name" style="color:${msgObj.color}">${msgObj.displayName}:</span> ${queueContent}`;
                qArea.appendChild(qDiv);
                qArea.scrollTop = qArea.scrollHeight;
            }
        });

        // Activity Feed remains same as previous (Events shouldn't need toggled timestamps usually)
        const activityArea = document.getElementById('area-2');
        const logEvent = (html, subtext = "") => {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="event-text">${html}</span>` + (subtext ? `<span class="event-subtext">${subtext}</span>` : "");
            activityArea.prepend(div); 
        };

        client.on('Twitch.RewardRedemption', (d) => logEvent(`🟡 <b>${d.data.reward.title}</b>`, `Redeemed by ${d.data.user_name}`));
        client.on('Twitch.Follow', (d) => logEvent(`💖 <b>${d.data.user_name}</b> followed!`));
        client.on('Twitch.ShoutoutCreated', (d) => logEvent(`📢 <b>Shoutout!</b>`, `To ${d.data.to_broadcaster_user_name}`));
        client.on('Twitch.Announcement', (d) => { if (d.data.message.toLowerCase().includes('streak')) logEvent(`🔥 <b>Stream Streak!</b>`, d.data.message); });
        client.on('Twitch.Subscription', (d) => logEvent(`💜 <b>${d.data.user_name}</b> subbed!`));
        client.on('Twitch.Raid', (d) => logEvent(`⚔️ <b>${d.data.from_broadcaster_user_name}</b> raided!`, `With ${d.data.viewers} viewers`));
        client.on('Twitch.Cheer', (d) => logEvent(`✨ <b>${d.data.user_name}</b> cheered ${d.data.bits} bits!`));
    </script>
</body>
</html>
