<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="status-indicator" class="status-disconnected">Connecting to Streamer.bot...</div>

    <div class="container">
        <div class="column">
            <h2>LIVE CHAT</h2>
            <div id="live-chat" class="content-area"></div>
        </div>
        <div class="column">
            <h2>ACTIVITY FEED</h2>
            <div id="activity-feed" class="content-area"></div>
        </div>
        <div class="column">
            <h2>FILTERED QUEUE</h2>
            <div id="filtered-queue" class="content-area"></div>
        </div>
    </div>

    <!-- CRITICAL: Load the library FIRST -->
    <script src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"></script>
    
    <!-- Load your logic SECOND -->
    <script src="main.js"></script>
</body>
</html>
