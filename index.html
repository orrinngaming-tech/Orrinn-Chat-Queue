<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamer Dashboard</title>
    <style>
        /* Your CSS styling goes here */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            padding: 20px;
        }
        #status {
            font-weight: bold;
            margin-bottom: 20px;
        }
        #chat-container {
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            background: #2a2a2a;
        }
        #chat-log {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        #chat-log li {
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <div id="chat-container">
        <h2>Live Chat</h2>
        <ul id="chat-log"></ul>
    </div>

    <!-- Include the Streamer.bot Client library from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>
    <!-- Your logic file -->
    <script src="main.js"></script>
</body>
</html>
