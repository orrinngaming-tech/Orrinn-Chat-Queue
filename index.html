<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        #status-indicator {
            font-weight: bold;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            background-color: #1e1e1e;
            color: #ff4444; 
            border: 1px solid #333;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .column {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .chat-msg {
            margin-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-name { color: #bb86fc; font-weight: bold; }
        .event-text { color: #03dac6; font-style: italic; }
        .bits-text { color: #ffb74d; font-weight: bold; } /* Orange for bits */
        .redeem-text { color: #f06292; font-weight: bold; } /* Pink for points */
    </style>
</head>
<body>

    <div id="status-indicator">Connecting to Streamer.bot...</div>

    <div class="container">
        <div class="column">
            <h2>Live Chat</h2>
            <div id="live-chat" class="content-area"></div>
        </div>
        <div class="column">
            <h2>Activity Feed</h2>
            <div id="activity-feed" class="content-area"></div>
        </div>
        <div class="column">
            <h2>Filtered Queue</h2>
            <div id="filtered-queue" class="content-area"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"></script>
    
    <script>
        const statusIndicator = document.getElementById('status-indicator');
        const activityArea = document.getElementById('activity-feed');

        function setConnected() {
            statusIndicator.innerText = 'Connected';
            statusIndicator.style.color = '#00ff00';
            statusIndicator.style.borderColor = '#00ff00';
        }

        function setDisconnected() {
            statusIndicator.innerText = 'Connecting to Streamer.bot...';
            statusIndicator.style.color = '#ff4444';
            statusIndicator.style.borderColor = '#333';
        }

        const client = new StreamerbotClient({
            host: '127.0.0.1',
            port: 8080,
            immediate: true,
            onConnect: setConnected,
            onDisconnect: setDisconnected
        });

        // Helper to push to Activity Feed
        function logActivity(html) {
            if (activityArea) {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = html;
                activityArea.prepend(div);
            }
        }

        // --- 1. CHAT & QUEUE LOGIC ---
        client.on('Twitch.ChatMessage', (data) => {
            const user = data.data.message.displayName;
            const msg = data.data.message.message;
            
            const chatArea = document.getElementById('live-chat');
            const queueArea = document.getElementById('filtered-queue');
            
            if (chatArea) {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<span class="user-name">${user}:</span> ${msg}`;
                chatArea.prepend(div);
            }

            // Command logic for your !c filter
            if (msg.toLowerCase().startsWith('!c ') && queueArea) {
                const cleanMsg = msg.substring(3).trim();
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.style.borderLeft = "3px solid #bb86fc";
                div.style.paddingLeft = "10px";
                div.innerHTML = `<span class="user-name">${user}:</span> ${cleanMsg}`;
                queueArea.prepend(div);
            }
        });

        // --- 2. EXTENDED ACTIVITY FEED LOGIC ---

        // Follows
        client.on('Twitch.Follow', (data) => {
            logActivity(`<span class="event-text">✨ ${data.data.user_name} followed!</span>`);
        });

        // Subscriptions
        client.on('Twitch.Subscription', (data) => {
            logActivity(`<span class="event-text">💜 ${data.data.user_name} subbed!</span>`);
        });

        // Bits / Cheers
        client.on('Twitch.Cheer', (data) => {
            logActivity(`<span class="bits-text">💎 ${data.data.user_name} cheered ${data.data.bits} bits!</span>`);
        });

        // Channel Point Redemptions
        client.on('Twitch.RewardRedemption', (data) => {
            logActivity(`<span class="redeem-text">🎁 ${data.data.user_name} redeemed: ${data.data.reward.title}</span>`);
        });

        // Raids
        client.on('Twitch.Raid', (data) => {
            logActivity(`<span class="event-text">⚔️ RAID! ${data.data.from_broadcaster_user_name} brought ${data.data.viewers} viewers!</span>`);
        });

    </script>
</body>
</html>
