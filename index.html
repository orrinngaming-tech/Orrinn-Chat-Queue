<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <style>
        /* Base Styles */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Status Indicator */
        #status-indicator {
            font-weight: bold;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            background-color: #1e1e1e;
            color: #ff4444; /* Default to disconnected red */
            border: 1px solid #333;
        }

        /* Layout Grid */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .column {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Message Styling */
        .chat-msg {
            margin-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 4px;
        }

        .user-name {
            color: #bb86fc;
            font-weight: bold;
        }

        /* Scrollbar Styling */
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="status-indicator">Connecting to Streamer.bot...</div>

    <div class="container">
        <div class="column">
            <h2>Live Chat</h2>
            <div id="live-chat" class="content-area"></div>
        </div>
        <div class="column">
            <h2>Activity Feed</h2>
            <div id="activity-feed" class="content-area"></div>
        </div>
        <div class="column">
            <h2>Filtered Queue</h2>
            <div id="filtered-queue" class="content-area"></div>
        </div>
    </div>

    <!-- Library Loading -->
    <script src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"></script>
    
    <script>
        // Initialize Client
        const client = new StreamerbotClient({
            host: '127.0.0.1',
            port: 8080,
            immediate: true
        });

        const statusIndicator = document.getElementById('status-indicator');

        // Connection Handlers (Lowercase for v1.x)
        client.on('connected', () => {
            console.log('Connected to Streamer.bot');
            statusIndicator.innerText = 'Connected';
            statusIndicator.style.color = '#00ff00';
            statusIndicator.style.borderColor = '#00ff00';
        });

        client.on('disconnected', () => {
            console.warn('Disconnected from Streamer.bot');
            statusIndicator.innerText = 'Connecting to Streamer.bot...';
            statusIndicator.style.color = '#ff4444';
            statusIndicator.style.borderColor = '#333';
        });

        // Chat Message Logic
        client.on('Twitch.ChatMessage', (data) => {
            const { displayName, message } = data.data;
            const chatArea = document.getElementById('live-chat');
            
            if (chatArea) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                msgDiv.innerHTML = `<span class="user-name">${displayName}:</span> ${message}`;
                chatArea.prepend(msgDiv);
            }
        });
    </script>
</body>
</html>
